apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lrail-residue-agent
  namespace: lrail-build-system
  labels:
    app.kubernetes.io/name: lrail-residue-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: lrail-residue-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lrail-residue-agent
        app.kubernetes.io/component: node-security
    spec:
      serviceAccountName: lrail-residue-agent
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: lrail-build-images
      enableServiceLinks: false
      hostPID: true
      hostNetwork: false
      hostIPC: false
      nodeSelector:
        lrail.dev/pool: build
      tolerations:
        - {key: lrail.dev/build, operator: Equal, value: "true", effect: NoSchedule}
        - {key: lrail.dev/build-quarantined, operator: Exists, effect: NoSchedule}
      priorityClassName: system-node-critical
      terminationGracePeriodSeconds: 15
      containers:
        - name: agent
          image: ghcr.io/mayowaoladosu/layerrail-lrail/residue-agent@sha256:d3196125699708f876e4f0a0a3abb7e944dc80a9a6beff2765180c0ed6b8b66c
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: true
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            appArmorProfile:
              type: Unconfined
          ports:
            - {name: grpc, containerPort: 9444, protocol: TCP}
          env:
            - name: LRAIL_NODE_NAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
            - {name: LRAIL_LISTEN_ADDRESS, value: ":9444"}
            - {name: LRAIL_CRI_SOCKET, value: /host/run/containerd/containerd.sock}
            - {name: LRAIL_KUBELET_PODS_ROOT, value: /host/var/lib/kubelet/pods}
            - {name: LRAIL_CGROUP_ROOT, value: /host/sys/fs/cgroup}
            - {name: LRAIL_MOUNTINFO_PATH, value: /proc/self/mountinfo}
            - {name: LRAIL_TLS_CERT, value: /run/lrail-tls/tls.crt}
            - {name: LRAIL_TLS_KEY, value: /run/lrail-tls/tls.key}
            - {name: LRAIL_TLS_CLIENT_CA, value: /run/lrail-tls/ca.crt}
            - name: LRAIL_ALLOWED_CLIENT_URIS
              valueFrom: {configMapKeyRef: {name: lrail-residue-agent-site, key: allowed-client-uris}}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
          readinessProbe:
            tcpSocket: {port: grpc}
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket: {port: grpc}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: kubelet-pods
              mountPath: /host/var/lib/kubelet/pods
              mountPropagation: Bidirectional
            - name: cgroup
              mountPath: /host/sys/fs/cgroup
              mountPropagation: HostToContainer
            - name: containerd-socket
              mountPath: /host/run/containerd/containerd.sock
            - name: tls
              mountPath: /run/lrail-tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: kubelet-pods
          hostPath: {path: /var/lib/kubelet/pods, type: Directory}
        - name: cgroup
          hostPath: {path: /sys/fs/cgroup, type: Directory}
        - name: containerd-socket
          hostPath: {path: /run/containerd/containerd.sock, type: Socket}
        - name: tls
          secret: {secretName: lrail-residue-agent-server-tls, defaultMode: 0400}
        - name: tmp
          emptyDir: {sizeLimit: 32Mi}
