apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: build-broker
  namespace: lrail-control
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: lrail-build-broker
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-control
            k8s:app.kubernetes.io/name: lrail-control-workers
      toPorts:
        - ports:
            - { port: "9444", protocol: TCP }
    - fromEntities: [host, remote-node]
      toPorts:
        - ports:
            - { port: "9444", protocol: TCP }
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-build-control
            k8s:app.kubernetes.io/name: lrail-build-control
      toPorts:
        - ports:
            - { port: "9443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-security
            k8s:app.kubernetes.io/name: openbao
      toPorts:
        - ports:
            - { port: "8200", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-storage
            k8s:app.kubernetes.io/name: minio
      toPorts:
        - ports:
            - { port: "9000", protocol: TCP }
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: build-control
  namespace: lrail-build-control
spec:
  egress:
    - toEntities: [kube-apiserver]
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-build
            k8s:app.kubernetes.io/name: lrail-build-worker
      toPorts:
        - ports:
            - { port: "1234", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-build-system
            k8s:app.kubernetes.io/name: lrail-residue-agent
      toPorts:
        - ports:
            - { port: "9444", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-build-control
            k8s:app.kubernetes.io/name: lrail-build-registry-broker
      toPorts:
        - ports:
            - { port: "9445", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-build-control
            k8s:app.kubernetes.io/name: lrail-build-evidence-signer
      toPorts:
        - ports:
            - { port: "9446", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-security
            k8s:app.kubernetes.io/name: openbao
      toPorts:
        - ports:
            - { port: "8200", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-storage
            k8s:app.kubernetes.io/name: minio
      toPorts:
        - ports:
            - { port: "9000", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: lrail-registry
            k8s:app.kubernetes.io/component: nginx
      toPorts:
        - ports:
            - { port: "8443", protocol: TCP }
            - { port: "8080", protocol: TCP }
    - toFQDNs:
        - matchName: ghcr.io
        - matchName: pkg-containers.githubusercontent.com
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
---
