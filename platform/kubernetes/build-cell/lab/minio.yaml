apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lrail-minio-data
  namespace: lrail-storage
  labels:
    dev.lrail/lab: mb
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: lrail-storage
  labels:
    app.kubernetes.io/name: minio
    dev.lrail/lab: mb
spec:
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: https
      port: 9000
      targetPort: https
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: lrail-storage
  labels:
    app.kubernetes.io/name: minio
    dev.lrail/lab: mb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        dev.lrail/lab: mb
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-07-23T15-54-02Z@sha256:d249d1fb6966de4d8ad26c04754b545205ff15a62e4fd19ebd0f26fa5baacbc0
          imagePullPolicy: IfNotPresent
          args:
            ["server", "/data", "--certs-dir", "/certs", "--address", ":9000"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: root-access-key }
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: root-secret-key }
          ports:
            - { name: https, containerPort: 9000, protocol: TCP }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 100m, memory: 256Mi, ephemeral-storage: 64Mi }
            limits: { cpu: "2", memory: 2Gi, ephemeral-storage: 512Mi }
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /minio/health/ready
              port: https
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /minio/health/live
              port: https
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: tls, mountPath: /certs, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: lrail-minio-data }
        - name: tls
          secret:
            secretName: minio-server-tls
            defaultMode: 0440
            items:
              - { key: tls.crt, path: public.crt }
              - { key: tls.key, path: private.key }
              - { key: ca.crt, path: CAs/lab-ca.crt }
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 64Mi }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lrail-minio-policies
  namespace: lrail-storage
  labels:
    dev.lrail/lab: mb
data:
  source-gateway.json: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:GetBucketLocation", "s3:GetBucketVersioning", "s3:ListBucket"],
          "Resource": ["arn:aws:s3:::lrail-source"]
        },
        {
          "Effect": "Allow",
          "Action": ["s3:DeleteObject", "s3:GetObject", "s3:PutObject"],
          "Resource": ["arn:aws:s3:::lrail-source/*"]
        }
      ]
    }
  source-reader.json: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:GetBucketLocation"],
          "Resource": ["arn:aws:s3:::lrail-source"]
        },
        {
          "Effect": "Allow",
          "Action": ["s3:ListBucket"],
          "Resource": ["arn:aws:s3:::lrail-source"],
          "Condition": {"StringLike": {"s3:prefix": ["snapshots/*"]}}
        },
        {
          "Effect": "Allow",
          "Action": ["s3:GetObject"],
          "Resource": ["arn:aws:s3:::lrail-source/snapshots/*"]
        }
      ]
    }
  cell-content.json: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:GetBucketLocation"],
          "Resource": ["arn:aws:s3:::lrail-build"]
        },
        {
          "Effect": "Allow",
          "Action": ["s3:ListBucket"],
          "Resource": ["arn:aws:s3:::lrail-build"],
          "Condition": {"StringLike": {"s3:prefix": ["cell-lab/*"]}}
        },
        {
          "Effect": "Allow",
          "Action": ["s3:GetObject", "s3:PutObject"],
          "Resource": ["arn:aws:s3:::lrail-build/cell-lab/*"]
        }
      ]
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: lrail-minio-init
  namespace: lrail-storage
  labels:
    app.kubernetes.io/name: lrail-minio-init
    dev.lrail/lab: mb
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lrail-minio-init
        dev.lrail/lab: mb
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-07-21T05-28-08Z@sha256:fb8f773eac8ef9d6da0486d5dec2f42f219358bcb8de579d1623d518c9ebd4cc
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              mc alias set local https://minio.lrail-storage.svc.cluster.local:9000 "$ROOT_ACCESS" "$ROOT_SECRET" --api S3v4
              mc mb --ignore-existing local/lrail-source
              mc mb --ignore-existing local/lrail-build
              mc version enable local/lrail-source
              mc version enable local/lrail-build
              mc admin policy create local lrail-source-gateway /policies/source-gateway.json
              mc admin policy create local lrail-source-reader /policies/source-reader.json
              mc admin policy create local lrail-cell-content /policies/cell-content.json
              mc admin user add local "$SOURCE_ACCESS" "$SOURCE_SECRET" || mc admin user enable local "$SOURCE_ACCESS"
              mc admin user add local "$READER_ACCESS" "$READER_SECRET" || mc admin user enable local "$READER_ACCESS"
              mc admin user add local "$CELL_ACCESS" "$CELL_SECRET" || mc admin user enable local "$CELL_ACCESS"
              mc admin policy attach local lrail-source-gateway --user "$SOURCE_ACCESS"
              mc admin policy attach local lrail-source-reader --user "$READER_ACCESS"
              mc admin policy attach local lrail-cell-content --user "$CELL_ACCESS"
          env:
            - name: MC_CONFIG_DIR
              value: /tmp/mc
            - name: SSL_CERT_FILE
              value: /certs/ca.crt
            - name: ROOT_ACCESS
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: root-access-key }
            - name: ROOT_SECRET
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: root-secret-key }
            - name: SOURCE_ACCESS
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: source-access-key }
            - name: SOURCE_SECRET
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: source-secret-key }
            - name: READER_ACCESS
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: reader-access-key }
            - name: READER_SECRET
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: reader-secret-key }
            - name: CELL_ACCESS
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: cell-access-key }
            - name: CELL_SECRET
              valueFrom:
                secretKeyRef:
                  { name: lrail-minio-bootstrap, key: cell-secret-key }
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 32Mi }
            limits: { cpu: 500m, memory: 256Mi, ephemeral-storage: 128Mi }
          volumeMounts:
            - { name: policies, mountPath: /policies, readOnly: true }
            - { name: ca, mountPath: /certs, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: policies
          configMap: { name: lrail-minio-policies, defaultMode: 0444 }
        - name: ca
          secret:
            secretName: minio-server-tls
            defaultMode: 0444
            items:
              - { key: ca.crt, path: ca.crt }
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 32Mi }
