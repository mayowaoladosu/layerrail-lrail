version: "3"

set:
  - errexit
  - nounset
  - pipefail

vars:
  CONTROL_PLANE: apps/control-plane
  CONTROL_WORKERS: apps/control-workers
  CONTROL_WORKERS_TEST_IMAGE: lrail-control-workers:test
  CONTROL_WORKERS_IMAGE: lrail-control-workers:local
  DETECTOR: services/detector
  SOURCE_GATEWAY_IMAGE: lrail-source-gateway:local

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  doctor:
    desc: Verify the deterministic developer environment
    cmds:
      - python tools/doctor.py

  bootstrap:
    desc: Install locked dependencies and generate contracts
    deps: [doctor]
    cmds:
      - corepack pnpm install --frozen-lockfile
      - task: rails:bootstrap
      - task: detector:bootstrap
      - go work sync
      - task: generate

  rails:bootstrap:
    internal: true
    dir: "{{.CONTROL_PLANE}}"
    cmds:
      - bundle install

  detector:bootstrap:
    internal: true
    dir: "{{.DETECTOR}}"
    cmds:
      - uv sync --frozen

  check:
    desc: Run formatting, lint, types, contracts, and fast security checks
    cmds:
      - task: control-workers:check
      - task: rails:check
      - corepack pnpm check
      - uv run --project "{{.DETECTOR}}" ruff format --check "{{.DETECTOR}}"
      - uv run --project "{{.DETECTOR}}" ruff check tools "{{.DETECTOR}}"
      - uv run --project "{{.DETECTOR}}" mypy "{{.DETECTOR}}/src"
      - go test ./...
      - corepack pnpm contracts:lint
      - python tools/validate-compose.py

  rails:check:
    internal: true
    dir: "{{.CONTROL_PLANE}}"
    cmds:
      - bundle exec rubocop
      - bundle exec brakeman --no-pager --quiet

  control-workers:check:
    internal: true
    cmds:
      - docker build --target test -t "{{.CONTROL_WORKERS_TEST_IMAGE}}" "{{.CONTROL_WORKERS}}"
      - docker run --rm "{{.CONTROL_WORKERS_TEST_IMAGE}}" bundle exec rubocop

  test:
    desc: Run all hermetic package tests
    cmds:
      - task: rails:test
      - corepack pnpm test
      - uv run --project "{{.DETECTOR}}" pytest "{{.DETECTOR}}/tests"
      - python tools/go-test-race.py

  rails:test:
    internal: true
    dir: "{{.CONTROL_PLANE}}"
    cmds:
      - bundle exec rspec

  test:integration:
    desc: Run tests against local dependencies
    cmds:
      - docker compose up -d --build --wait postgres temporal nats valkey minio mailpit source-gateway
      - task: rails:db:prepare
      - task: rails:test:integration
      - task: source:test:integration
      - task: control-workers:test:integration
      - task: db:verify

  source:test:integration:
    internal: true
    env:
      LRAIL_SOURCE_INTEGRATION: "1"
    cmds:
      - go test ./services/source-plane/integration -v

  control-workers:test:integration:
    internal: true
    cmds:
      - docker build --target test -t "{{.CONTROL_WORKERS_TEST_IMAGE}}" "{{.CONTROL_WORKERS}}"
      - >-
        docker run --rm --network lrail-dev_control
        -e LRAIL_TEMPORAL_ADDRESS=temporal:7233
        "{{.CONTROL_WORKERS_TEST_IMAGE}}"

  rails:test:integration:
    internal: true
    dir: "{{.CONTROL_PLANE}}"
    env:
      LRAIL_NATS_INTEGRATION: "1"
      LRAIL_SOURCE_INTEGRATION: "1"
    cmds:
      - bundle exec rspec spec/integration

  lab:up:
    desc: Start the complete lightweight local profile
    cmds:
      - docker compose up -d --wait

  lab:verify:
    desc: Validate configuration, cold start dependencies, and probe protocols
    cmds:
      - python tools/verify-local-stack.py

  lab:down:
    desc: Stop the local profile without deleting named data
    cmds:
      - docker compose down

  db:prepare:
    desc: Create and migrate local control-plane databases
    cmds:
      - task: rails:db:prepare

  db:dump:
    desc: Generate the PostgreSQL structure dump through the pinned local container
    cmds:
      - python tools/dump-rails-structure.py

  db:verify:
    desc: Restore and verify the PostgreSQL SQL schema in a disposable database
    cmds:
      - python tools/verify-rails-structure.py

  rails:db:prepare:
    internal: true
    cmds:
      - task: rails:db:migrate:development
      - task: rails:db:migrate:test

  rails:db:migrate:development:
    internal: true
    dir: "{{.CONTROL_PLANE}}"
    cmds:
      - bundle exec rails db:create db:migrate
    env:
      LRAIL_DATABASE_USER: lrail_local

  rails:db:migrate:test:
    internal: true
    dir: "{{.CONTROL_PLANE}}"
    cmds:
      - bundle exec rails db:create db:migrate
    env:
      RAILS_ENV: test
      LRAIL_DATABASE_USER: lrail_local

  e2e:
    desc: Run browser, API, and CLI golden journeys
    cmds:
      - corepack pnpm --filter @lrail/e2e test

  security:
    desc: Run repository, dependency, code, image, and policy security checks
    cmds:
      - python tools/scan-secrets.py
      - task: control-workers:security
      - task: detector:security
      - task: rails:security
      - corepack pnpm audit --audit-level high
      - govulncheck ./...

  control-workers:security:
    internal: true
    cmds:
      - docker build --target test -t "{{.CONTROL_WORKERS_TEST_IMAGE}}" "{{.CONTROL_WORKERS}}"
      - docker run --rm "{{.CONTROL_WORKERS_TEST_IMAGE}}" bundle exec bundler-audit check --update

  detector:security:
    internal: true
    dir: "{{.DETECTOR}}"
    cmds:
      - uv run pip-audit

  rails:security:
    internal: true
    dir: "{{.CONTROL_PLANE}}"
    cmds:
      - bundle exec bundler-audit check --update
      - bundle exec brakeman --no-pager

  generate:
    desc: Generate all contracts and verify deterministic output
    cmds:
      - buf generate
      - corepack pnpm contracts:generate
      - uv run --project "{{.DETECTOR}}" python "{{.DETECTOR}}/tools/generate_schema.py"
      - >-
        corepack pnpm exec prettier --write
        sdk/typescript/src/generated/lrail-v1.ts
        contracts/jsonschema/detector/detection-result-v2.schema.json

  package:
    desc: Build candidate artifacts from locked inputs
    cmds:
      - docker build --target runtime -t "{{.CONTROL_WORKERS_IMAGE}}" "{{.CONTROL_WORKERS}}"
      - docker build -f services/source-plane/Dockerfile -t "{{.SOURCE_GATEWAY_IMAGE}}" .
      - docker buildx bake --file platform/build/docker-bake.hcl
