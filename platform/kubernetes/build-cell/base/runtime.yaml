apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-qemu
handler: kata-qemu
overhead:
  podFixed:
    cpu: 250m
    memory: 256Mi
scheduling:
  nodeSelector:
    lrail.dev/kata: "true"
    lrail.dev/pool: build
  tolerations:
    - key: lrail.dev/build
      operator: Equal
      value: "true"
      effect: NoSchedule
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: lrail-build
value: -1000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: Disposable customer builds remain below control-plane and node-system workloads.
