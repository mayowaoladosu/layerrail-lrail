apiVersion: v1
kind: ConfigMap
metadata:
  name: lrail-build-cell-site
  namespace: lrail-build-control
data:
  cell-id: cell_019b01da-7e31-7000-8000-000000000001
  object-prefix: s3://lrail-build/cell-example/
  s3-endpoint: s3.example.invalid
  s3-region: us-east-1
  openbao-address: https://openbao.example.invalid
  openbao-role: build-cell
  cluster-dns-cidr: 10.96.0.10/32
  cluster-dns-address: 10.96.0.10:53
  residue-server-name: lrail-residue-agent.lrail-build-system.svc.cluster.local
